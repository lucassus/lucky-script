name: Lucky Script

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
        with:
          node-version: 25.9.0

      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test --verbose --coverage --runInBand
      - run: yarn build
